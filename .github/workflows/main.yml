name: Saudi Scraper 2.5 Run

on:
  schedule:
    - cron: '0 * * * *' # يعمل تلقائياً كل ساعة
  workflow_dispatch: # يتيح لك التشغيل اليدوي للتجربة

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3 # تحديث للإصدار v3

    - name: Set up Python
      uses: actions/setup-python@v4 # تم تصحيح الاسم هنا من successes إلى actions
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install selenium webdriver-manager requests google-generativeai

    - name: Run Scraper 2.5
      env:
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python saudi_scraper.py
